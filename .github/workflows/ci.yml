name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: superta/package-lock.json

      - name: Install dependencies
        working-directory: superta
        run: npm install

      - name: Build
        working-directory: superta
        run: npm run build

      - name: Test
        working-directory: superta
        run: npm test
